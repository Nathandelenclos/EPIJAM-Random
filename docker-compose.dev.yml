services:
  db:
    image: postgres:16-alpine
    container_name: valorantcasino-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: valorantcasino
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - '5432:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d valorantcasino']
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    image: node:22-slim
    container_name: valorantcasino-app-dev
    working_dir: /app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://app:app@db:5432/valorantcasino
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
    ports:
      - '3000:3000'
    volumes:
      - ./:/app
      - app_node_modules:/app/node_modules
    command: >
      sh -c "corepack enable &&
      pnpm install --no-frozen-lockfile &&
      pnpm exec prisma generate --schema prisma/schema.prisma &&
      pnpm exec prisma db push --skip-generate &&
      pnpm run dev -- --host 0.0.0.0 --port 3000"

volumes:
  postgres_data_dev:
  app_node_modules:
